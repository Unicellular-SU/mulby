name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布的版本 tag（例如 v0.2.0）'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libarchive-tools libx11-dev rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: runner.os != 'macOS'
        run: pnpm install

      - name: Install dependencies (macOS universal native binaries)
        if: runner.os == 'macOS'
        run: pnpm install --force --frozen-lockfile

      - name: Build app native modules
        run: pnpm run native:build

      - name: Initialize releases repo (if empty)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 检查 mulby-releases 仓库是否为空
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/Unicellular-SU/mulby-releases/commits?per_page=1")
          if [ "$HTTP_CODE" = "409" ]; then
            echo "mulby-releases 仓库为空，正在初始化..."
            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"
            git init
            git checkout -b main
            echo "# Mulby Releases" > README.md
            echo "" >> README.md
            echo "此仓库用于托管 Mulby 应用的自动更新发布文件。" >> README.md
            git add README.md
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: initialize releases repository"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Unicellular-SU/mulby-releases.git"
            git push -u origin main
            cd -
            rm -rf "$TMP_DIR"
            echo "初始化完成"
          else
            echo "mulby-releases 仓库已有内容，跳过初始化"
          fi

      - name: Build and Publish
        run: pnpm run electron:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # macOS 代码签名（可选，未配置时使用 ad-hoc 签名）
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
