name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布的版本 tag（例如 v0.2.0）'
        required: false
      platform:
        description: '手动发布的平台'
        required: false
        type: choice
        default: all
        options:
          - all
          - macos
          - windows
          - linux

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name != 'workflow_dispatch' && '["macos-latest","windows-latest","ubuntu-latest"]' || github.event.inputs.platform == 'macos' && '["macos-latest"]' || github.event.inputs.platform == 'windows' && '["windows-latest"]' || github.event.inputs.platform == 'linux' && '["ubuntu-latest"]' || '["macos-latest","windows-latest","ubuntu-latest"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libarchive-tools libx11-dev rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate macOS resource update signing key
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        run: node scripts/derive-mac-resource-update-public-key.cjs >/dev/null
        env:
          MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM }}

      - name: Install dependencies
        if: runner.os != 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || (runner.os == 'Windows' && github.event.inputs.platform == 'windows') || (runner.os == 'Linux' && github.event.inputs.platform == 'linux'))
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install dependencies (macOS universal native binaries)
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        run: pnpm install --force --frozen-lockfile

      - name: Build app native modules
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || (runner.os == 'macOS' && github.event.inputs.platform == 'macos') || (runner.os == 'Windows' && github.event.inputs.platform == 'windows') || (runner.os == 'Linux' && github.event.inputs.platform == 'linux')
        run: pnpm run native:build

      - name: Initialize releases repo (if empty)
        if: matrix.os == 'macos-latest' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 检查 mulby-releases 仓库是否为空
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/Unicellular-SU/mulby-releases/commits?per_page=1")
          if [ "$HTTP_CODE" = "409" ]; then
            echo "mulby-releases 仓库为空，正在初始化..."
            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"
            git init
            git checkout -b main
            echo "# Mulby Releases" > README.md
            echo "" >> README.md
            echo "此仓库用于托管 Mulby 应用的自动更新发布文件。" >> README.md
            git add README.md
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: initialize releases repository"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Unicellular-SU/mulby-releases.git"
            git push -u origin main
            cd -
            rm -rf "$TMP_DIR"
            echo "初始化完成"
          else
            echo "mulby-releases 仓库已有内容，跳过初始化"
          fi

      - name: Build and Publish (Windows/Linux)
        if: runner.os != 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || (runner.os == 'Windows' && github.event.inputs.platform == 'windows') || (runner.os == 'Linux' && github.event.inputs.platform == 'linux'))
        run: pnpm run electron:publish:prepared
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build macOS unsigned installers
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          public_key_pem="$(node scripts/derive-mac-resource-update-public-key.cjs)"
          export MULBY_MAC_RESOURCE_UPDATE_PUBLIC_KEY_PEM="$public_key_pem"
          pnpm run electron:build:mac:unsigned:prepared
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MULBY_MAC_UNSIGNED_RESOURCE_UPDATES: "true"
          MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM }}

      - name: Generate macOS resource update assets
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        shell: bash
        run: |
          set -euo pipefail
          args=(--tag "${{ github.event.inputs.tag || github.ref_name }}")
          if [ -n "${MULBY_MAC_RESOURCE_UPDATE_MIN_APP_VERSION:-}" ]; then
            args+=(--min-app-version "$MULBY_MAC_RESOURCE_UPDATE_MIN_APP_VERSION")
          fi
          if [ -n "${MULBY_MAC_RESOURCE_UPDATE_MAX_APP_VERSION:-}" ]; then
            args+=(--max-app-version "$MULBY_MAC_RESOURCE_UPDATE_MAX_APP_VERSION")
          fi
          if [ "${MULBY_MAC_RESOURCE_UPDATE_REQUIRES_MANUAL_INSTALL:-false}" = "true" ]; then
            args+=(--requires-manual-install)
          fi
          if [ -n "${MULBY_MAC_RESOURCE_UPDATE_MANUAL_INSTALL_REASON:-}" ]; then
            args+=(--manual-install-reason "$MULBY_MAC_RESOURCE_UPDATE_MANUAL_INSTALL_REASON")
          fi
          node scripts/generate-mac-resource-update.cjs "${args[@]}"
        env:
          MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM: ${{ secrets.MAC_RESOURCE_UPDATE_PRIVATE_KEY_PEM }}
          MULBY_MAC_RESOURCE_UPDATE_MIN_APP_VERSION: ${{ vars.MULBY_MAC_RESOURCE_UPDATE_MIN_APP_VERSION || '0.8.3' }}
          MULBY_MAC_RESOURCE_UPDATE_MAX_APP_VERSION: ${{ vars.MULBY_MAC_RESOURCE_UPDATE_MAX_APP_VERSION }}
          MULBY_MAC_RESOURCE_UPDATE_REQUIRES_MANUAL_INSTALL: ${{ vars.MULBY_MAC_RESOURCE_UPDATE_REQUIRES_MANUAL_INSTALL }}
          MULBY_MAC_RESOURCE_UPDATE_MANUAL_INSTALL_REASON: ${{ vars.MULBY_MAC_RESOURCE_UPDATE_MANUAL_INSTALL_REASON }}

      - name: Publish macOS release assets
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo Unicellular-SU/mulby-releases >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo Unicellular-SU/mulby-releases --title "$RELEASE_TAG" --notes "Mulby $RELEASE_TAG"

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("$file")
          done < <(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name 'latest-mac-resource*.json' \) -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No macOS release assets found under release/" >&2
            exit 1
          fi

          # uploads.github.com 对大文件上传偶发中断并误报 HTTP 401（GitHub 平台已知问题，
          # 参见 cli/cli#4863），gh 不会对 401 自动重试。逐文件上传并重试，
          # --clobber 同时负责覆盖上次中断遗留的半截 asset。
          upload_with_retry() {
            local file="$1"
            local attempt
            for attempt in 1 2 3; do
              if gh release upload "$RELEASE_TAG" "$file" --repo Unicellular-SU/mulby-releases --clobber; then
                echo "Uploaded: $file"
                return 0
              fi
              echo "Upload failed for $file (attempt $attempt/3), retrying in $((attempt * 15))s..." >&2
              sleep $((attempt * 15))
            done
            echo "Upload failed for $file after 3 attempts" >&2
            return 1
          }

          for file in "${assets[@]}"; do
            upload_with_retry "$file"
          done
