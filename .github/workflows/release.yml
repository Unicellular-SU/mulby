name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动发布的版本 tag（例如 v0.2.0）'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install macOS cross-arch sharp binaries
        if: runner.os == 'macOS'
        run: |
          # macos-latest runner 是 arm64，npm ci 只装了 arm64 的 sharp binary。
          # 额外安装 x64 的 native binary，使打包产物同时支持 Intel Mac。
          npm install --no-save --no-audit --no-fund \
            @img/sharp-darwin-x64@$(node -p "require('./node_modules/sharp/package.json').optionalDependencies['@img/sharp-darwin-x64']") \
            @img/sharp-libvips-darwin-x64@$(node -p "require('./node_modules/sharp/package.json').optionalDependencies['@img/sharp-libvips-darwin-x64']")

      - name: Initialize releases repo (if empty)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 检查 mulby-releases 仓库是否为空
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/Unicellular-SU/mulby-releases/commits?per_page=1")
          if [ "$HTTP_CODE" = "409" ]; then
            echo "mulby-releases 仓库为空，正在初始化..."
            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"
            git init
            git checkout -b main
            echo "# Mulby Releases" > README.md
            echo "" >> README.md
            echo "此仓库用于托管 Mulby 应用的自动更新发布文件。" >> README.md
            git add README.md
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: initialize releases repository"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Unicellular-SU/mulby-releases.git"
            git push -u origin main
            cd -
            rm -rf "$TMP_DIR"
            echo "初始化完成"
          else
            echo "mulby-releases 仓库已有内容，跳过初始化"
          fi

      - name: Build and Publish
        run: npm run electron:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # macOS 代码签名（可选，未配置时使用 ad-hoc 签名）
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.yaml
          retention-days: 30
