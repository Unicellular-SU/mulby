name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Smoke test native modules (ensure electron-rebuild succeeded)
        shell: bash
        run: |
          node -e "
          const mods = ['better-sqlite3', 'sharp'];
          let failed = false;
          for (const m of mods) {
            try { require(m); console.log('[native-smoke] ' + m + ' OK'); }
            catch (e) { console.error('[native-smoke] ' + m + ' FAIL: ' + e.message); failed = true; }
          }
          if (failed) process.exit(1);
          "

      - name: Verify app
        run: pnpm run verify:app

      - name: Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Quality Gate"
            echo "- Node.js: 22"
            echo "- OS: ubuntu-latest"
            echo "- App: install -> verify:app"
          } >> "$GITHUB_STEP_SUMMARY"
