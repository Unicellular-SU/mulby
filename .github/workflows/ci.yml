name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

      - name: Build Smoke
        run: npm run build:smoke

      - name: Workflow Summary
        if: always()
        run: |
          {
            echo "## Quality Gate"
            echo "- Node.js: 20"
            echo "- Steps: install -> typecheck -> lint -> unit test -> build smoke"
          } >> "$GITHUB_STEP_SUMMARY"
