name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/mulby-cli/package-lock.json

      - name: Install app dependencies
        run: npm ci --no-audit --no-fund

      - name: Install CLI dependencies
        run: npm run install:cli-deps

      - name: Verify app
        run: npm run verify:app

      - name: Verify CLI
        run: npm run verify:cli

      - name: Workflow Summary
        if: always()
        run: |
          {
            echo "## Quality Gate"
            echo "- Node.js: 20"
            echo "- OS: ${{ matrix.os }}"
            echo "- App: install -> verify:app"
            echo "- CLI: install -> verify:cli"
          } >> "$GITHUB_STEP_SUMMARY"
