<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Base64 编解码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      height: 32px;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      font-size: 13px;
      color: #999;
    }
    .container {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    textarea {
      flex: 1;
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      border-radius: 6px;
      padding: 12px;
      color: #fff;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    textarea:focus {
      border-color: #0078d4;
    }
    textarea::placeholder {
      color: #666;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button {
      padding: 8px 24px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-encode {
      background: #0078d4;
      color: #fff;
    }
    .btn-encode:hover {
      background: #1084d8;
    }
    .btn-decode {
      background: #107c10;
      color: #fff;
    }
    .btn-decode:hover {
      background: #1a8c1a;
    }
    .label {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="titlebar">Base64 编解码</div>
  <div class="container">
    <div class="label">输入文本</div>
    <textarea id="input" placeholder="请输入要编码或解码的文本..."></textarea>
    <div class="buttons">
      <button class="btn-encode" onclick="encode()">编码</button>
      <button class="btn-decode" onclick="decode()">解码</button>
    </div>
    <div class="label">结果</div>
    <textarea id="output" placeholder="结果将显示在这里..." readonly></textarea>
  </div>
  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');

    // 接收初始化数据
    window.intools?.onPluginInit?.((data) => {
      if (data.input) {
        inputEl.value = data.input;
      }
    });

    function encode() {
      try {
        const text = inputEl.value;
        const result = btoa(unescape(encodeURIComponent(text)));
        outputEl.value = result;
        copyAndNotify(result, 'Base64 编码成功，已复制到剪贴板');
      } catch (e) {
        outputEl.value = '编码失败: ' + e.message;
        window.intools?.notification?.show('编码失败', 'error');
      }
    }

    function decode() {
      try {
        const text = inputEl.value;
        const result = decodeURIComponent(escape(atob(text)));
        outputEl.value = result;
        copyAndNotify(result, 'Base64 解码成功，已复制到剪贴板');
      } catch (e) {
        outputEl.value = '解码失败: 无效的 Base64 字符串';
        window.intools?.notification?.show('解码失败：无效的 Base64', 'error');
      }
    }

    async function copyAndNotify(text, message) {
      await window.intools?.clipboard?.writeText(text);
      window.intools?.notification?.show(message);
    }
  </script>
</body>
</html>
