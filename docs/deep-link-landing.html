<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mulby — 启动链接</title>
  <style>
    :root {
      --bg: #0b1220;
      --card-bg: rgba(15, 23, 42, 0.92);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --border: #334155;
      --success: #4ade80;
      --error: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
      background: radial-gradient(120% 120% at 15% 0%, #0b2447 0%, #111827 42%, #020617 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: 24px;
    }

    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 56px rgba(2, 6, 23, 0.6);
    }

    .plugin-info {
      margin-bottom: 24px;
    }

    .plugin-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .plugin-id {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f172a;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(96, 165, 250, 0.3);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      margin-top: 12px;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 20px;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeIn 0.3s ease-out; }

    /* 加载动画 */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15, 23, 42, 0.3);
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1 class="title">Mulby 启动链接</h1>
    <p class="subtitle">
      点击下方按钮使用 Mulby 打开此功能。<br/>
      如果尚未安装 Mulby，请先下载安装。
    </p>

    <div class="card">
      <div class="plugin-info">
        <div class="plugin-name" id="pluginName">加载中...</div>
        <div class="plugin-id" id="pluginId"></div>
      </div>

      <button class="btn btn-primary" id="launchBtn" onclick="launchMulby()">
        在 Mulby 中打开
      </button>

      <div class="status" id="status"></div>

      <div class="divider"></div>

      <a class="btn btn-secondary" id="downloadBtn" href="https://github.com/Unicellular-SU/mulby-releases/releases/latest" target="_blank">
        📥 下载 Mulby
      </a>
    </div>

    <div class="footer">
      由 <a href="https://github.com/Unicellular-SU/mulby" target="_blank">Mulby</a> 提供支持
    </div>
  </div>

  <script>
    /**
     * Mulby Deep Link 落地页
     *
     * 使用方式:
     *   deep-link-landing.html?url=mulby://plugin/run/json-formatter/format
     *   deep-link-landing.html?plugin=json-formatter&feature=format&name=JSON 格式化
     *
     * 参数:
     *   url     — 完整的 mulby:// URL（优先使用）
     *   plugin  — 插件 ID
     *   feature — 功能 code
     *   name    — 插件显示名称（可选）
     *   input   — 初始输入文本（可选）
     */

    const params = new URLSearchParams(window.location.search)
    const fullUrl = params.get('url')
    const pluginId = params.get('plugin') || ''
    const featureCode = params.get('feature') || ''
    const pluginName = params.get('name') || pluginId
    const input = params.get('input') || ''

    // 构建 mulby:// URL
    let mulbyUrl = fullUrl
    if (!mulbyUrl && pluginId && featureCode) {
      const encoded = `mulby://plugin/run/${encodeURIComponent(pluginId)}/${encodeURIComponent(featureCode)}`
      mulbyUrl = input ? `${encoded}?input=${encodeURIComponent(input)}` : encoded
    }

    // 更新 UI
    document.getElementById('pluginName').textContent = pluginName || '未知插件'
    document.getElementById('pluginId').textContent = pluginId ? `ID: ${pluginId}` : ''

    if (!mulbyUrl) {
      document.getElementById('status').textContent = '⚠️ 链接参数不完整'
      document.getElementById('status').className = 'status error'
      document.getElementById('launchBtn').disabled = true
    }

    let launchAttempted = false

    function launchMulby() {
      if (!mulbyUrl || launchAttempted) return
      launchAttempted = true

      const statusEl = document.getElementById('status')
      statusEl.innerHTML = '<span class="spinner"></span> 正在唤起 Mulby...'
      statusEl.className = 'status'

      // 方案 1: 尝试通过隐藏 iframe 打开协议
      const iframe = document.createElement('iframe')
      iframe.style.display = 'none'
      iframe.src = mulbyUrl
      document.body.appendChild(iframe)

      // 2 秒内无响应说明可能未安装
      setTimeout(() => {
        document.body.removeChild(iframe)

        // 检查页面是否失去焦点（说明协议被成功处理）
        if (document.hidden || document.hasFocus() === false) {
          statusEl.textContent = '✅ 已唤起 Mulby'
          statusEl.className = 'status success'
        } else {
          statusEl.textContent = '未检测到 Mulby，请确认已安装'
          statusEl.className = 'status error'
          launchAttempted = false
        }
      }, 2500)
    }

    // 如果有完整 URL 参数，自动尝试唤起
    if (mulbyUrl && params.has('auto')) {
      setTimeout(launchMulby, 500)
    }
  </script>
</body>
</html>
