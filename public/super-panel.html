<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mulby Super Panel</title>
  <link rel="stylesheet" href="./super-panel.css" />
</head>

<body>
  <div class="sp-shell">
    <!-- 头部：选中内容预览 -->
    <div class="sp-header">
      <div class="sp-captured">
        <svg class="sp-captured-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="12" height="12" rx="2" />
          <path d="M6 6h4M6 8.5h2.5" />
        </svg>
        <span id="captured-text" class="sp-captured-text empty">未选中内容</span>
      </div>
    </div>

    <!-- 列表区域 -->
    <div id="item-list" class="sp-list">
      <div class="sp-empty">暂无匹配指令</div>
    </div>

    <!-- 底部提示 -->
    <div class="sp-footer">
      <div class="sp-hint">
        <kbd>↑↓</kbd> 选择
        <kbd>↵</kbd> 执行
        <kbd>Esc</kbd> 关闭
      </div>
    </div>
  </div>

  <script src="./super-panel.js"></script>
</body>

</html>
