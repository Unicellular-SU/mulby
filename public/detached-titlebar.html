<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titlebar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ===== 主题变量 ===== */
    :root {
      --tb-bg: #ffffff;
      --tb-border: #e2e8f0;
      --tb-title-color: #1e293b;
      --tb-btn-color: #64748b;
      --tb-btn-hover-bg: rgba(0, 0, 0, 0.06);
      --tb-btn-hover-color: #1e293b;
      --tb-pin-active-color: #3b82f6;
    }

    :root.dark {
      --tb-bg: #1e293b;
      --tb-border: #334155;
      --tb-title-color: #f1f5f9;
      --tb-btn-color: #94a3b8;
      --tb-btn-hover-bg: rgba(255, 255, 255, 0.1);
      --tb-btn-hover-color: #f1f5f9;
      --tb-pin-active-color: #3b82f6;
    }

    body {
      background: var(--tb-bg);
    }

    /* ===== 标题栏 ===== */
    .titlebar {
      display: flex;
      align-items: center;
      width: 100%;
      height: 36px;
      border-bottom: 1px solid var(--tb-border);
      position: relative;
      cursor: default;
    }

    /* ===== 标题文字 ===== */
    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--tb-title-color);
      pointer-events: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 100px;
      line-height: 36px;
    }

    /* ===== 按钮容器 ===== */
    .titlebar-controls {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ===== 按钮 ===== */
    .tb-btn {
      width: 40px;
      height: 100%;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      outline: none;
      color: var(--tb-btn-color);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      padding: 0;
      margin: 0;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .tb-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .tb-btn:hover {
      background: var(--tb-btn-hover-bg);
      color: var(--tb-btn-hover-color);
    }

    .tb-btn.active {
      color: var(--tb-pin-active-color);
    }
    .tb-btn.active:hover {
      color: var(--tb-pin-active-color);
    }

    .tb-btn-close:hover {
      background: #e81123;
      color: white;
    }

    /* 隐藏 SVG 的切换逻辑 */
    .tb-btn .icon-active { display: none; }
    .tb-btn.active .icon-default { display: none; }
    .tb-btn.active .icon-active { display: block; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title" id="title-text">Plugin</div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btn-more" title="更多插件操作">
        <svg viewBox="0 0 24 24">
          <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-pin" title="置顶">
        <svg viewBox="0 0 24 24" class="icon-default">
          <path d="M14 4v5c0 1.12.37 2.16 1 3H9c.65-.86 1-1.9 1-3V4h4m3-2H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H19v-2c-1.66 0-3-1.34-3-3V4h1c.55 0 1-.45 1-1s-.45-1-1-1z"/>
        </svg>
        <svg viewBox="0 0 24 24" class="icon-active">
          <path d="M16 9V4h1c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H19v-2c-1.66 0-3-1.34-3-3z"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-minimize" title="最小化">
        <svg viewBox="0 0 24 24">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>
      <button class="tb-btn" id="btn-maximize" title="最大化">
        <svg viewBox="0 0 24 24" class="icon-default">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
        </svg>
        <svg viewBox="0 0 24 24" class="icon-active">
          <path d="M18 4H8c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-2h2c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-4 14H4v-8h10v8zm4-4h-2v-4c0-1.1-.9-2-2-2H8V6h10v8z"/>
        </svg>
      </button>
      <button class="tb-btn tb-btn-close" id="btn-close" title="关闭">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // 初始化标题栏逻辑
    (function() {
      const titleEl = document.getElementById('title-text')
      const btnMore = document.getElementById('btn-more')
      const btnPin = document.getElementById('btn-pin')
      const btnMinimize = document.getElementById('btn-minimize')
      const btnMaximize = document.getElementById('btn-maximize')
      const btnClose = document.getElementById('btn-close')
      const titlebar = document.querySelector('.titlebar')
      const api = window.mulbyTitlebar

      if (!api) {
        console.error('[Titlebar] mulbyTitlebar API not available')
        return
      }

      let isAlwaysOnTop = false

      // === JS-based window drag (fallback for -webkit-app-region issues in multi-view) ===
      var isDragging = false
      var didDrag = false
      var dragStartScreenX = 0
      var dragStartScreenY = 0

      titlebar.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return
        if (e.target.closest('.titlebar-controls')) return

        isDragging = true
        didDrag = false
        dragStartScreenX = e.screenX
        dragStartScreenY = e.screenY
        api.startDrag(e.screenX, e.screenY)
        e.preventDefault()
      })

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return
        didDrag = true
        api.dragging(e.screenX, e.screenY)
      })

      document.addEventListener('mouseup', function(e) {
        if (isDragging) {
          isDragging = false
          api.endDrag()
          // If it was a click (no drag movement), request focus for the plugin content
          if (!didDrag) {
            api.requestFocus()
          }
        }
      })

      // 接收初始化数据
      api.onInit(function(data) {
        if (data.title && titleEl) {
          titleEl.textContent = data.title
          document.title = data.title
        }
        if (data.theme) {
          applyTheme(data.theme)
        }
      })

      // 更多插件操作
      btnMore.addEventListener('click', function() {
        if (typeof api.showPluginMenu === 'function') {
          var rect = btnMore.getBoundingClientRect()
          api.showPluginMenu({ x: rect.left, y: rect.bottom })
        }
      })

      // 置顶
      btnPin.addEventListener('click', function() {
        isAlwaysOnTop = !isAlwaysOnTop
        api.action('toggle-pin')
        btnPin.classList.toggle('active', isAlwaysOnTop)
        btnPin.title = isAlwaysOnTop ? '取消置顶' : '置顶'
      })

      // 最小化
      btnMinimize.addEventListener('click', function() {
        api.action('minimize')
      })

      // 最大化/还原
      btnMaximize.addEventListener('click', function() {
        api.action('maximize')
      })

      // 关闭
      btnClose.addEventListener('click', function() {
        api.action('close')
      })

      // 窗口状态变化
      api.onWindowState(function(state) {
        btnMaximize.classList.toggle('active', state.isMaximized)
        btnMaximize.title = state.isMaximized ? '还原' : '最大化'
      })

      // 获取初始状态
      api.getState().then(function(state) {
        isAlwaysOnTop = state.isAlwaysOnTop
        btnPin.classList.toggle('active', isAlwaysOnTop)
        btnPin.title = isAlwaysOnTop ? '取消置顶' : '置顶'
        btnMaximize.classList.toggle('active', state.isMaximized)
        btnMaximize.title = state.isMaximized ? '还原' : '最大化'
      })

      // 主题变化
      api.onThemeChange(function(theme) {
        applyTheme(theme)
      })

      function applyTheme(theme) {
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.classList.toggle('light', theme === 'light')
      }
    })()
  </script>
</body>
</html>
