<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="plastic-glow" x="-20%" y="-20%" width="140%" height="140%">
             <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"></feGaussianBlur>
             <feOffset in="blur" dx="1" dy="2" result="offsetBlur"></feOffset>
             <feMerge>
                <feMergeNode in="offsetBlur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
        </filter>

        <!-- 积木葡萄组件 (方形 1x1 Brick 风格) -->
        <g id="blockGrape">
            <!-- 侧面厚度 (深色阴影部分) -->
            <!-- 将矩形中心定位在 (0,0) 以匹配之前的圆形坐标系统 -->
            <!-- 宽度 38 (留2px缝隙), 高度 42 (包含厚度) -->
            <rect x="-19" y="-15" width="38" height="38" rx="2" fill="#311B92"></rect> 
            
            <!-- 顶部平面 -->
            <rect x="-19" y="-19" width="38" height="38" rx="2" fill="#673AB7" stroke="#512DA8" stroke-width="1.5"></rect>
            
            <!-- 顶部边缘高光 (模拟倒角) -->
            <path d="M-17 -17 H 17" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"></path>

            <!-- 顶部凸起 (Stud) -->
            <g>
                <circle cx="0" cy="0" r="10" fill="#7E57C2"></circle> <!-- Stud Base -->
                <circle cx="0" cy="0" r="10" fill="none" stroke="#5E35B1" stroke-width="1"></circle> <!-- Stud Edge -->
                <circle cx="0" cy="-2" r="10" fill="#9575CD"></circle> <!-- Stud Top -->
                <!-- 强高光 -->
                <path d="M-3 -6 Q0 -9 3 -6" stroke="white" stroke-width="2" fill="none" opacity="0.9" stroke-linecap="round"></path>
            </g>
        </g>
        
        <!-- 积木叶子组件 (矩形板) -->
        <g id="blockLeaf">
             <!-- 侧面 -->
             <rect x="0" y="4" width="28" height="14" rx="1" fill="#1B5E20"></rect>
             <!-- 顶部 -->
             <rect x="0" y="0" width="28" height="14" rx="1" fill="#43A047" stroke="#2E7D32" stroke-width="1"></rect>
             <!-- 凸起 -->
             <circle cx="14" cy="7" r="4" fill="#66BB6A"></circle>
             <circle cx="14" cy="5" r="4" fill="#81C784"></circle>
        </g>
      </defs>
    
      <g transform="translate(20, 8)" filter="url(#plastic-glow)">
        
        <!-- 阴影底座 (方形化) -->
        <rect x="40" y="170" width="120" height="20" rx="4" fill="#000" fill-opacity="0.15"></rect>

        <!-- 按照原图坐标堆叠积木 -->
        
        <!-- 最底层/最暗 (Deep Purple) -->
        <g>
            <use href="#blockGrape" x="75" y="85" style="--color:dark"></use>
            <use href="#blockGrape" x="125" y="85"></use>
            <use href="#blockGrape" x="58" y="115"></use>
            <use href="#blockGrape" x="142" y="115"></use>
        </g>

        <!-- 中间层 (Mid Purple) -->
        <g>
            <use href="#blockGrape" x="75" y="145" filter="brightness(1.1)"></use>
            <use href="#blockGrape" x="125" y="145" filter="brightness(1.1)"></use>
            <use href="#blockGrape" x="100" y="160" filter="brightness(1.05)"></use>
            
            <use href="#blockGrape" x="62" y="108" filter="brightness(1.2)"></use>
            <use href="#blockGrape" x="138" y="108" filter="brightness(1.2)"></use>
            <use href="#blockGrape" x="100" y="138" filter="brightness(1.2)"></use>
        </g>

        <!-- 最顶层/最亮 (Light Purple) -->
        <g>
            <use href="#blockGrape" x="100" y="100" filter="brightness(1.4) saturate(0.8)"></use>
            <!-- 高光点缀，加强顶部高光 -->
            <path d="M85 85 L95 85" stroke="white" stroke-width="2" opacity="0.4" pointer-events="none"></path>
        </g>

        <!-- 叶子部分 -->
        <g transform="translate(100, 65) rotate(-15)">
            <use href="#blockLeaf" x="0" y="0"></use>
            <use href="#blockLeaf" x="20" y="-8" transform="rotate(25)"></use>
            <use href="#blockLeaf" x="-22" y="8" transform="rotate(-15)"></use>
        </g>
        
        <!-- 叶柄 (方形柱子) -->
         <rect x="94" y="50" width="8" height="24" rx="1" fill="#5D4037" transform="rotate(-10 100 65)"></rect>
         <rect x="94" y="48" width="8" height="24" rx="1" fill="#795548" stroke="#4E342E" stroke-width="1" transform="rotate(-10 100 65)"></rect>
         <circle cx="98" cy="52" r="3" fill="#8D6E63" transform="rotate(-10 100 65)"></circle>

      </g>
    </svg>